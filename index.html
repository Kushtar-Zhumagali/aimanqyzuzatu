  <!-- 本地自托管字体 — 无任何外部依赖，离线可用，加载不再受 Google 服务可用性影响 -->
  <link rel="stylesheet" href="assets/fonts/fonts.css" />
  <link rel="stylesheet" href="styles.css" />

  <!-- Inline tiny SVG favicon: gold ornament -->
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="%23F6EEDD"/><path d="M32 12c-6 6-6 14 0 20s6 14 0 20c-6-6-6-14 0-20s6-14 0-20z" fill="%23B89461"/></svg>' />
</head>
<body class="is-loading">
  <!-- ╔══════════════ ORNAMENTAL SVG DEFINITIONS ══════════════╗ -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <!-- Кошкармүйіз / Ram's horn — refined symmetric scroll ornament -->
      <symbol id="orn-ram" viewBox="0 0 280 60">
        <g fill="none" stroke="currentColor" stroke-width="0.9" stroke-linecap="round">
          <!-- center medallion -->
          <circle cx="140" cy="30" r="3" fill="currentColor" />
          <circle cx="140" cy="30" r="7" />
          <!-- inner horns -->
          <path d="M140 30 q-14 -18 -32 -10 q-16 7 -8 22 q6 11 18 4 q8 -5 0 -14" />
          <path d="M140 30 q14 -18 32 -10 q16 7 8 22 q-6 11 -18 4 q-8 -5 0 -14" />
          <!-- side leaves -->
          <path d="M85 30 q-6 -10 -16 -6 q-10 4 -6 14 q3 7 11 3 q6 -3 3 -10" />
          <path d="M195 30 q6 -10 16 -6 q10 4 6 14 q-3 7 -11 3 q-6 -3 -3 -10" />
          <!-- tiny rails -->
          <path d="M52 30 h10 M218 30 h10" stroke-dasharray="2 3" />
          <!-- tips -->
          <path d="M30 30 q5 -6 10 0 q-5 6 -10 0z M240 30 q-5 -6 -10 0 q5 6 10 0z" fill="currentColor" />
        </g>
      </symbol>

      <!-- Ою divider — fine ornamental rule -->
      <symbol id="orn-rule" viewBox="0 0 300 24">
        <g fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round">
          <path d="M0 12 h128" />
          <path d="M172 12 h128" />
          <path d="M128 12 q4 -7 8 0 q-4 7 -8 0z" fill="currentColor" />
          <path d="M172 12 q-4 -7 -8 0 q4 7 8 0z" fill="currentColor" />
          <circle cx="150" cy="12" r="1.8" fill="currentColor" />
          <circle cx="150" cy="12" r="5" />
          <circle cx="150" cy="12" r="9" stroke-dasharray="1.5 3" />
        </g>
      </symbol>

      <!-- Medallion — refined circular Kazakh emblem -->
      <symbol id="orn-medallion" viewBox="0 0 120 120">
        <g fill="none" stroke="currentColor" stroke-width="0.9">
          <circle cx="60" cy="60" r="56" />
          <circle cx="60" cy="60" r="48" stroke-dasharray="1.5 4" />
          <circle cx="60" cy="60" r="38" />
          <g>
            <path d="M60 22 q-9 14 0 28 q9 -14 0 -28z" fill="currentColor" fill-opacity="0.4" />
            <path d="M60 98 q-9 -14 0 -28 q9 14 0 28z" fill="currentColor" fill-opacity="0.4" />
            <path d="M22 60 q14 -9 28 0 q-14 9 -28 0z" fill="currentColor" fill-opacity="0.4" />
            <path d="M98 60 q-14 -9 -28 0 q14 9 28 0z" fill="currentColor" fill-opacity="0.4" />
          </g>
          <g stroke-width="0.6">
            <path d="M60 32 q-6 8 0 16 q6 -8 0 -16z" />
            <path d="M60 88 q-6 -8 0 -16 q6 8 0 16z" />
            <path d="M32 60 q8 -6 16 0 q-8 6 -16 0z" />
            <path d="M88 60 q-8 -6 -16 0 q8 6 16 0z" />
          </g>
          <circle cx="60" cy="60" r="4" fill="currentColor" />
        </g>
      </symbol>

      <!-- Long horizontal banner ornament for section frames -->
      <symbol id="orn-banner" viewBox="0 0 360 28">
        <g fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round">
          <path d="M0 14 q40 0 80 -6 q40 -6 80 6 q40 12 80 0 q40 -12 80 -6 q40 6 40 6" opacity="0.4" />
          <path d="M0 14 h150 M210 14 h150" />
          <circle cx="180" cy="14" r="2" fill="currentColor" />
          <circle cx="180" cy="14" r="6" />
          <path d="M168 14 q6 -8 12 0 q-6 8 -12 0z M192 14 q-6 -8 -12 0 q6 8 12 0z" fill="currentColor" fill-opacity="0.5" />
        </g>
      </symbol>

      <!-- 雾粉细纸纹 — 提高细密度 + 木莓色调染色，整页有"纸张"质感 -->
      <filter id="grain">
        <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" stitchTiles="stitch" />
        <feColorMatrix values="0 0 0 0 0.55  0 0 0 0 0.38  0 0 0 0 0.36  0 0 0 0.14 0" />
      </filter>

      <!-- Subtle background tile pattern -->
      <pattern id="bg-pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
        <g fill="none" stroke="#B89461" stroke-width="0.45" opacity="0.10">
          <path d="M50 12 q-12 14 0 28 q12 -14 0 -28z" />
          <path d="M50 60 q-12 14 0 28 q12 -14 0 -28z" />
          <circle cx="50" cy="50" r="1" fill="#B89461" opacity="0.5" />
        </g>
      </pattern>
    </defs>
  </svg>

  <!-- Animated mesh gradient (breathing blobs) -->
  <div class="mesh" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <div class="blob blob-5"></div>
  </div>

  <!-- Background pattern overlay (very faint) -->
  <div class="bg-pattern" aria-hidden="true">
    <svg width="100%" height="100%"><rect width="100%" height="100%" fill="url(#bg-pattern)" /></svg>
  </div>

  <!-- Paper grain noise overlay -->
  <div class="grain" aria-hidden="true">
    <svg width="100%" height="100%"><rect width="100%" height="100%" filter="url(#grain)" /></svg>
  </div>

  <!-- Ambient floating gold particles -->
  <div class="ambient-particles" id="ambient" aria-hidden="true"></div>

  <!-- Custom cursor (desktop only) -->
  <div class="cursor" id="cursor" aria-hidden="true">
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>
  </div>

  <!-- Scroll progress · chapter dots (right-side rail) -->
  <nav class="progress" id="progress" aria-label="Sections">
    <a class="progress-dot" href="#chapter-blessing"><span>01</span></a>
    <a class="progress-dot" href="#chapter-details"><span>02</span></a>
    <a class="progress-dot" href="#chapter-hosts"><span>03</span></a>
    <a class="progress-dot" href="#rsvp"><span>04</span></a>
    <a class="progress-dot" href="#chapter-wishes"><span>05</span></a>
  </nav>

  <!-- ╔══════════════ INTRO ENVELOPE ══════════════╗ -->
  <div class="intro" id="intro" aria-hidden="true">
    <div class="dust" id="dust"></div>

    <div class="envelope">
      <!-- envelope back, inner card peeking out, V-front, flap, then seal on top -->
      <div class="env-body"></div>
      <div class="env-card">
        <svg viewBox="0 0 120 120" width="30" height="30" class="env-card-orn"><use href="#orn-medallion" /></svg>
        <span class="env-card-eyebrow" id="env-eyebrow">қыз ұзату</span>
        <span class="env-card-names env-card-names--solo">
          <span class="env-name env-name--solo" id="env-bride">Aiman</span>
        </span>
        <span class="env-card-rule" aria-hidden="true"></span>
        <span class="env-card-date" id="env-date">13 · 07 · 2026</span>
      </div>
      <div class="env-front"></div>
      <div class="env-flap"></div>

      <!-- wax seal (drawn with SVG so we can stroke-animate it) -->
      <div class="env-seal">
        <svg viewBox="0 0 120 120" width="86" height="86">
          <defs>
            <radialGradient id="seal-grad" cx="35%" cy="32%">
              <stop offset="0%"  stop-color="#D4B583" />
              <stop offset="55%" stop-color="#A85D4B" />
              <stop offset="100%" stop-color="#6E2E22" />
            </radialGradient>
          </defs>
          <circle class="seal-ring-bg" cx="60" cy="60" r="48" fill="url(#seal-grad)" />
          <circle class="seal-ring" cx="60" cy="60" r="48" fill="none" stroke="#FBE8C4" stroke-width="1.4" />
          <g class="seal-orn" stroke="#FBE8C4" stroke-width="1.4" fill="none" stroke-linecap="round">
            <path d="M60 26 q-12 18 0 34 q12 -18 0 -34z" />
            <path d="M60 94 q-12 -18 0 -34 q12 18 0 34z" />
            <path d="M26 60 q18 -12 34 0 q-18 12 -34 0z" />
            <path d="M94 60 q-18 -12 -34 0 q18 12 34 0z" />
            <circle cx="60" cy="60" r="3.4" fill="#FBE8C4" />
          </g>
        </svg>
      </div>
    </div>

    <p class="intro-hint" id="intro-hint">tap to open</p>
  </div>

  <!-- ╔══════════════ TOP BAR ══════════════╗ -->
  <header class="topbar topbar--solo" role="banner">
    <span class="topbar-spacer" aria-hidden="true"></span>
    <button class="music-btn" id="music-btn" aria-label="Music">
      <svg viewBox="0 0 24 24" class="ic-music-off" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <svg viewBox="0 0 24 24" class="ic-music-on" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/><path d="M3 3l18 18" stroke-width="1.4"/></svg>
    </button>
  </header>

  <!-- ╔══════════════ HERO ══════════════╗ -->
  <section class="hero">
    <div class="hero-inner">
      <p class="eyebrow" data-i18n="heroEyebrow"></p>
      <p class="invite-line" data-i18n="heroInvite"></p>

      <svg class="orn orn-top" width="280" height="60"><use href="#orn-ram" /></svg>

      <!-- 拱门相框 + 粉саукеле 照片 -->
      <figure class="hero-arch" aria-hidden="true">
        <img src="assets/photos/hero-saukele.jpg" alt="" loading="eager" />
        <span class="hero-arch-diamond tl"></span>
        <span class="hero-arch-diamond tr"></span>
        <span class="hero-arch-diamond bl"></span>
        <span class="hero-arch-diamond br"></span>
      </figure>

      <h1 class="names names--solo">
        <span class="name name--solo" id="name-bride" data-text=""></span>
      </h1>

      <!-- ою 横向纹饰带 -->
      <svg class="hero-oyu" viewBox="0 0 360 28" preserveAspectRatio="none" aria-hidden="true">
        <g fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round">
          <!-- 长条横线 + 中央菱形花心 + 两侧涡卷 -->
          <path d="M0 14 L120 14" />
          <path d="M240 14 L360 14" />
          <!-- 中央花心 -->
          <path d="M180 4 L188 14 L180 24 L172 14 Z" fill="currentColor" fill-opacity="0.18" />
          <circle cx="180" cy="14" r="2" fill="currentColor" />
          <!-- 左涡卷 -->
          <path d="M120 14 q8 -10 18 -4 q10 6 0 12 q-8 4 -12 -4" opacity="0.7" />
          <path d="M148 14 q4 -6 10 -2 q4 4 0 8 q-4 2 -8 -2" opacity="0.55" />
          <!-- 右涡卷 -->
          <path d="M240 14 q-8 -10 -18 -4 q-10 6 0 12 q8 4 12 -4" opacity="0.7" />
          <path d="M212 14 q-4 -6 -10 -2 q-4 4 0 8 q4 2 8 -2" opacity="0.55" />
          <!-- 小钻饰 -->
          <path d="M70 14 q4 -5 8 0 q-4 5 -8 0z" fill="currentColor" fill-opacity="0.4" />
          <path d="M282 14 q4 -5 8 0 q-4 5 -8 0z" fill="currentColor" fill-opacity="0.4" />
          <!-- 端点小圆 -->
          <circle cx="0" cy="14" r="1.5" fill="currentColor" />
          <circle cx="360" cy="14" r="1.5" fill="currentColor" />
        </g>
      </svg>

      <svg class="orn orn-bot" width="280" height="60"><use href="#orn-ram" /></svg>

      <p class="date-line" data-i18n="dateLine"></p>

      <!-- Countdown -->
      <div class="countdown" id="countdown" aria-live="polite">
        <p class="countdown-title" data-i18n="countdown.title"></p>
        <div class="countdown-grid">
          <div class="cd-cell"><span class="cd-num" id="cd-d">--</span><span class="cd-lbl" data-i18n="countdown.d"></span></div>
          <div class="cd-cell"><span class="cd-num" id="cd-h">--</span><span class="cd-lbl" data-i18n="countdown.h"></span></div>
          <div class="cd-cell"><span class="cd-num" id="cd-m">--</span><span class="cd-lbl" data-i18n="countdown.m"></span></div>
          <div class="cd-cell"><span class="cd-num" id="cd-s">--</span><span class="cd-lbl" data-i18n="countdown.s"></span></div>
        </div>
      </div>

      <button class="btn btn-pill btn-ghost" id="btn-calendar">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
        <span data-i18n="addToCalendar"></span>
      </button>
    </div>

    <div class="scroll-hint" aria-hidden="true">
      <span class="scroll-hint-line"></span>
    </div>

    <div class="hero-glow" aria-hidden="true"></div>
  </section>

  <!-- ╔══════════════ BLESSING ══════════════╗ -->
  <section class="section blessing reveal" id="chapter-blessing">
    <span class="chapter-num">— 01 —</span>
    <h2 class="section-title" data-i18n="blessingTitle"></h2>
    <svg class="rule" width="280" height="24"><use href="#orn-rule" /></svg>
    <blockquote class="blessing-quote" id="blessing-quote"></blockquote>
  </section>

  <!-- — Marquee strip — -->
  <div class="marquee" aria-hidden="true">
    <div class="marquee-track" id="marquee-track"></div>
  </div>

  <!-- ╔══════════════ DETAILS ══════════════╗ -->
  <section class="section details reveal" id="chapter-details">
    <span class="chapter-num">— 02 —</span>
    <h2 class="section-title" data-i18n="detailsTitle"></h2>
    <svg class="rule" width="280" height="24"><use href="#orn-rule" /></svg>

    <!-- 编辑杂志直排 · 4 条信息整合到 2 组 -->
    <div class="detail-list">
      <!-- ① 时间 = 日期 + 时刻 -->
      <div class="detail-row">
        <span class="detail-label" data-i18n="labelWhen"></span>
        <svg class="detail-divider" viewBox="0 0 120 12" preserveAspectRatio="none" aria-hidden="true">
          <g fill="none" stroke="currentColor" stroke-width="0.7" stroke-linecap="round">
            <path d="M0 6 H48" />
            <path d="M72 6 H120" />
            <path d="M60 1 L66 6 L60 11 L54 6 Z" fill="currentColor" fill-opacity="0.22" />
            <circle cx="60" cy="6" r="1.2" fill="currentColor" />
          </g>
        </svg>
        <div class="detail-stack">
          <span class="detail-value" id="d-date"></span>
          <span class="detail-value detail-value--soft" id="d-time"></span>
        </div>
      </div>

      <!-- ② 地点 = 宴会厅 + 地址 -->
      <div class="detail-row">
        <span class="detail-label" data-i18n="labelWhere"></span>
        <svg class="detail-divider" viewBox="0 0 120 12" preserveAspectRatio="none" aria-hidden="true">
          <g fill="none" stroke="currentColor" stroke-width="0.7" stroke-linecap="round">
            <path d="M0 6 H48" />
            <path d="M72 6 H120" />
            <path d="M60 1 L66 6 L60 11 L54 6 Z" fill="currentColor" fill-opacity="0.22" />
            <circle cx="60" cy="6" r="1.2" fill="currentColor" />
          </g>
        </svg>
        <div class="detail-stack">
          <span class="detail-value" id="d-venue"></span>
          <span class="detail-value detail-value--address" id="d-address"></span>
        </div>
      </div>
    </div>

    <a class="btn btn-primary" id="btn-2gis" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22s-7-7.5-7-13a7 7 0 1114 0c0 5.5-7 13-7 13z"/><circle cx="12" cy="9" r="2.5"/></svg>
      <span data-i18n="open2gis"></span>
    </a>
  </section>

  <!-- — 章节过场图 (戴戒指的手 + ою) — -->
  <figure class="photo-break reveal" aria-hidden="true">
    <img src="assets/photos/hands-jewelry.jpg" alt="" />
  </figure>

  <!-- ╔══════════════ ТОЙ ИЕЛЕРІ · 婚礼主人 ══════════════╗ -->
  <section class="section toi-hosts reveal" id="chapter-hosts">
    <span class="chapter-num">— 03 —</span>
    <h2 class="section-title" data-i18n="hostsTitle"></h2>
    <svg class="rule" width="280" height="24"><use href="#orn-rule" /></svg>

    <p class="toi-welcome" id="toi-welcome"></p>

    <div class="toi-parents">
      <div class="toi-parent">
        <span class="toi-parent-role" data-i18n="fatherRole"></span>
        <span class="toi-parent-name" id="toi-father"></span>
      </div>
      <span class="toi-parents-amp" aria-hidden="true">&amp;</span>
      <div class="toi-parent">
        <span class="toi-parent-role" data-i18n="motherRole"></span>
        <span class="toi-parent-name" id="toi-mother"></span>
      </div>
    </div>

  </section>

  <!-- — 诗意瞬间 · 妈妈整理新娘头饰 + 哈萨克古典诗句 — -->
  <figure class="poetic-moment reveal">
    <div class="photo-vignette photo-vignette--mother">
      <img src="assets/photos/mother-bride.jpg" alt="" />
    </div>
    <figcaption class="poetic-line">
      Ата-ана тілеуі —<br>
      <span>қыздың қанаты</span>
    </figcaption>
  </figure>

  <!-- ╔══════════════ RSVP ══════════════╗ -->
  <section class="section rsvp reveal" id="rsvp">
    <span class="chapter-num">— 04 —</span>
    <h2 class="section-title" data-i18n="rsvpTitle"></h2>
    <svg class="rule" width="280" height="24"><use href="#orn-rule" /></svg>
    <p class="rsvp-sub" data-i18n="rsvpSubtitle"></p>

    <form class="rsvp-form" id="rsvp-form" novalidate>
      <label class="field">
        <span class="field-label" data-i18n="fieldName"></span>
        <input type="text" name="name" required autocomplete="name" />
      </label>

      <fieldset class="field field-radio">
        <legend class="field-label" data-i18n="fieldAttending"></legend>
        <label class="radio-pill">
          <input type="radio" name="attending" value="yes" required />
          <span data-i18n="optYes"></span>
        </label>
        <label class="radio-pill">
          <input type="radio" name="attending" value="no" />
          <span data-i18n="optNo"></span>
        </label>
      </fieldset>

      <label class="field count-field" id="count-field">
        <span class="field-label" data-i18n="fieldCount"></span>
        <div class="count-stepper">
          <button type="button" class="count-btn" data-step="-1">−</button>
          <input type="number" name="count" min="1" max="20" value="1" inputmode="numeric" />
          <button type="button" class="count-btn" data-step="1">+</button>
        </div>
      </label>

      <label class="field">
        <span class="field-label" data-i18n="fieldMessage"></span>
        <textarea name="message" rows="3"></textarea>
      </label>

      <button type="submit" class="btn btn-primary btn-submit" id="btn-submit">
        <span data-i18n="submit"></span>
      </button>

      <p class="rsvp-status" id="rsvp-status" role="status" aria-live="polite"></p>
    </form>
  </section>

  <!-- ╔══════════════ GUESTBOOK ══════════════╗ -->
  <section class="section wishes reveal" id="chapter-wishes">
    <span class="chapter-num">— 05 —</span>
    <h2 class="section-title" data-i18n="wishesTitle"></h2>
    <svg class="rule" width="280" height="24"><use href="#orn-rule" /></svg>
    <ul class="wishes-list" id="wishes-list">
      <li class="wishes-empty" data-i18n="wishesEmpty"></li>
    </ul>
    <button class="wishes-toggle" id="wishes-toggle" type="button" hidden>
      <span class="wishes-toggle-text"></span>
      <svg class="wishes-toggle-ic" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
    </button>
  </section>

  <!-- ╔══════════════ CONTACT ══════════════╗ -->
  <section class="section contact reveal">
    <h2 class="section-title" data-i18n="contactTitle"></h2>
    <svg class="rule" width="280" height="24"><use href="#orn-rule" /></svg>
    <ul class="contact-list" id="contact-list"></ul>
  </section>

  <!-- ╔══════════════ FOOTER ══════════════╗ -->
  <footer class="footer">
    <svg class="orn" width="180" height="48"><use href="#orn-ram" /></svg>
    <p data-i18n="footer"></p>
  </footer>

  <!-- audio element for background music (file lives in assets/) -->
  <audio id="bg-audio" loop preload="none"></audio>

  <script src="config.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
